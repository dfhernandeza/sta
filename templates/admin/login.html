{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema | STA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body class="login-page">
  <div class="login-card">
    <!-- LOGO -->
    <div class="text-center mb-4">
      <div style="width:60px;height:60px;border-radius:16px;background:var(--sta-navy);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;font-weight:800;color:white;">STA</div>
      <h4 class="fw-800 mb-1" style="color:var(--sta-navy);">STA Muebles y Terminaciones</h4>
      <p class="small mb-0" style="color:var(--sta-steel);">Sistema de Gestión Interna</p>
    </div>

    <!-- ERRORES -->
    {% if form.non_field_errors %}
      <div class="alert alert-danger py-2 mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i>
        {{ form.non_field_errors.0 }}
      </div>
    {% endif %}

    <!-- FORMULARIO -->
    <form method="post" novalidate class="mt-4">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-600 small" style="color:var(--sta-navy);">{{ form.username.label }}</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--sta-bg);border-color:#ced4da;color:var(--sta-steel);">
            <i class="bi bi-person"></i>
          </span>
          <input type="text"
                 name="{{ form.username.html_name }}"
                 id="{{ form.username.id_for_label }}"
                 class="form-control{% if form.username.errors %} is-invalid{% endif %}"
                 placeholder="Nombre de usuario"
                 autofocus
                 autocomplete="username"
                 value="{{ form.username.value|default:'' }}">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600 small" style="color:var(--sta-navy);">{{ form.password.label }}</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--sta-bg);border-color:#ced4da;color:var(--sta-steel);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password"
                 name="{{ form.password.html_name }}"
                 id="{{ form.password.id_for_label }}"
                 class="form-control{% if form.password.errors %} is-invalid{% endif %}"
                 placeholder="Contraseña"
                 autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-sta w-100 fw-700 py-2 rounded-pill">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
      </button>
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}
    </form>

    <div class="text-center mt-4">
      <a href="{% url 'web:index' %}" class="small text-decoration-none" style="color:var(--sta-steel);">
        <i class="bi bi-arrow-left me-1"></i>Volver al sitio web
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
